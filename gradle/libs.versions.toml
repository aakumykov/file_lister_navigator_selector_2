[versions]
agp = "8.13.0"
android_storage_lister = "4.0.0-alpha"
authsdk = "3.2.0"
cloud_reader_x = "4.1.0-alpha"
cloud_writer_x = "7.4.0-alpha"
extensible_sorting_comparator = "0.0.2"
fragmentKtx = "1.8.9"
gson = "2.13.2"
kaspresso = "1.6.1"
kotlin = "2.3.0"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
list_holding_list_adapter = "0.0.5-alpha"
material = "1.13.0"
orchestrator = "1.6.1"
